services:
  kubo:
    image: ipfs/kubo:master-latest
    container_name: kubo-${ID}
    volumes:
      - ipfs_path:/data/ipfs
      - ipfs_fuse:/ipfs
      - ipns_fuse:/ipns
      - ./config/kubo/0001-init-config.sh:/container-init.d/0001-init-config.sh
    environment:
      - IPFS_PATH=/data/ipfs
      - IPFS_PROFILE=server
    ports:
      - ${KUBO_TCP_PORT:-4001}:4001/tcp
      - ${KUBO_UDP_PORT:-4001}:4001/udp
      - ${KUBO_ADMIN_PORT:-127.0.0.1:5001}:5001
      - ${KUBO_GATEWAY_PORT:-127.0.0.1:1882}:8080
    networks:
      - xray-graph-services
    labels:
      - traefik.enable=true
      - traefik.http.routers.kubo-${ID}.rule=Header(`X-XRAY-GRAPH-ID`,`kubo-${ID}`)
      - traefik.http.routers.kubo-${ID}.entrypoints=websecure
      - traefik.http.routers.kubo-${ID}.tls=true
      - traefik.http.routers.kubo-${ID}.service=kubo-${ID}
      - traefik.http.services.kubo-${ID}.loadbalancer.server.port=8080
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"

networks:
  xray-graph-services:
    name: xray-graph-services

volumes:
  ipfs_path:
  ipfs_fuse:
  ipns_fuse:
