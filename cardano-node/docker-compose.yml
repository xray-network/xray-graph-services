services:
  config-init:
    image: ghcr.io/intersectmbo/cardano-node:11.0.1
    container_name: cardano-node-config-init-${NETWORK}-${ID}
    entrypoint: >
      sh -c "cp -rn /opt/cardano/config/${NETWORK}/. /config-out/"
    volumes:
      - ../volumes/cardano-node-${NETWORK}-${ID}/config:/config-out

  cardano-node:
    image: ghcr.io/intersectmbo/cardano-node:11.0.1
    container_name: cardano-node-${NETWORK}-${ID}
    environment:
      - NETWORK=${NETWORK}
    ports:
      - ${CARDANO_NODE_PORT}:3001
    volumes:
      - ../volumes/cardano-node-${NETWORK}-${ID}/db:/data/db
      - ../volumes/cardano-node-${NETWORK}-${ID}/ipc:/ipc
      - ../volumes/cardano-node-${NETWORK}-${ID}/config:/opt/cardano/config/${NETWORK}
    depends_on:
      config-init:
        condition: service_completed_successfully
