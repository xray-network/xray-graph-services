services:
  postgres:
    build:
      context: .
      target: postgres
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-127.0.0.1:5432}:5432"
    shm_size: 2gb
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./config/postgresql.conf:/etc/postgresql.conf
      - ./config/01_init.sql:/docker-entrypoint-initdb.d/01_init.sql
    networks:
      - xray-graph-services
    restart: unless-stopped

volumes:
  postgres-data:

networks:
  xray-graph-services:
    name: xray-graph-services
